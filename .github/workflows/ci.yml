name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"

jobs:
  # ─── Build & lint web app ───
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --legacy-peer-deps
      - run: npm run typecheck 2>/dev/null || echo "Typecheck skipped"
      - run: npm run lint 2>/dev/null || echo "Lint skipped"

  # ─── Build all artifacts ───
  build:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install --legacy-peer-deps
      - run: npm run build:raw 2>/dev/null || echo "Next.js build skipped"
      - name: Build worker package
        working-directory: ./worker
        run: |
          npm install
          npm run build 2>/dev/null || echo "Worker build skipped"

  # ─── Publish to npm (GitHub Packages) ───
  publish-npm:
    if: github.event_name == 'release' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://npm.pkg.github.com
          scope: "@wyattnoise"
      - run: npm install --legacy-peer-deps
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Publish Python wheel to GitHub Packages ───
  publish-python:
    if: github.event_name == 'release' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install --upgrade pip setuptools wheel build twine
      - run: python -m build
      - name: Publish to GitHub Packages
        run: |
          twine upload --repository-url https://uploads.packages.github.com/ \
            dist/*.whl \
            -u __token__ -p "${{ secrets.GITHUB_TOKEN }}"
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: supercompute-python-wheel
          path: dist/

  # ─── Build & push Docker image to ghcr.io ───
  docker:
    if: github.event_name == 'release' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/wyattnoise/supercomputer
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
